<style>
  :root{
    --ink:#16242B;
    --ink-2:#1F343C;
    --pitch:#2F6E52;
    --pitch-dark:#21503C;
    --whistle:#F2B705;
    --card-red:#D64545;
    --chalk:#F7F5EC;
    --paper:#FFFFFF;
    --slate:#6B7B78;
    --line:#E4E1D6;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  #app{
    font-family:'Work Sans',sans-serif;
    color:var(--ink);
    background:transparent;
    max-width:920px;
    margin:0 auto;
    padding:0 0 60px;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--slate);
  }
  h1,h2,h3{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:.02em;
    margin:0;
  }
  /* ---------- HEADER ---------- */
  .site-header{
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.025) 0 2px, transparent 2px 26px),
      linear-gradient(155deg, var(--ink) 0%, var(--ink-2) 55%, #24463A 100%);
    color:var(--chalk);
    border-radius:var(--radius) var(--radius) 0 0;
    padding:22px 24px 20px;
    position:relative;
    overflow:hidden;
    border-bottom:3px solid var(--whistle);
  }
  .site-header::after{
    content:"";
    position:absolute;
    right:-40px;top:-40px;
    width:200px;height:200px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(242,183,5,.20), transparent 70%);
  }
  .header-top{
    display:flex;
    align-items:center;
    gap:14px;
    position:relative;
    z-index:1;
  }
  .logo-badge{
    width:58px;height:58px;
    border-radius:12px;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    box-shadow:0 3px 10px rgba(0,0,0,.3);
    padding:5px;
    overflow:hidden;
  }
  .logo-badge img{
    width:100%;height:100%;object-fit:contain;
  }
  .header-text{flex:1;min-width:0;}
  .site-header h1{
    font-size:21px;
    color:var(--chalk);
    line-height:1.15;
  }
  .site-header .eyebrow{color:var(--whistle);}
  .site-header .sub{
    font-size:12.5px;
    color:rgba(247,245,236,.75);
    margin-top:4px;
  }
  .panel{
    background:var(--paper);
    border:1px solid var(--line);
    border-top:none;
    border-radius:0 0 var(--radius) var(--radius);
    padding:24px;
  }
  /* ---------- FORM META ---------- */
  .meta-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:26px;
  }
  .field{display:flex;flex-direction:column;gap:5px;}
  .field.full{grid-column:1/-1;}
  .field label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--slate);
  }
  .field input, .field select, .field textarea{
    font-family:'Work Sans',sans-serif;
    font-size:14px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:7px;
    background:var(--chalk);
    color:var(--ink);
  }
  .field textarea{resize:vertical;min-height:64px;}
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:2px solid var(--pitch);
    outline-offset:1px;
  }
  .week-picker{display:flex;flex-wrap:wrap;gap:6px;}
  .week-chip{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    padding:7px 10px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--chalk);
    color:var(--ink);
    cursor:pointer;
    transition:transform .1s ease, background .12s ease;
    white-space:nowrap;
  }
  .week-chip:hover{transform:translateY(-1px);}
  .week-chip.selected{
    background:var(--pitch);
    border-color:var(--pitch-dark);
    color:#fff;
    font-weight:700;
    box-shadow:0 2px 6px rgba(47,110,82,.35);
  }
  /* ---------- GROUP SECTIONS ---------- */
  .group-block{margin-bottom:28px;}
  .group-head{
    display:flex;
    align-items:baseline;
    gap:10px;
    border-bottom:2px solid var(--ink);
    padding-bottom:6px;
    margin-bottom:14px;
  }
  .group-head h2{font-size:16px;color:var(--ink);}
  .group-head .sub{font-size:12px;color:var(--slate);font-style:italic;font-family:'Work Sans';}
  .cat-row{
    display:grid;
    grid-template-columns:1fr auto;
    align-items:center;
    gap:12px;
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .cat-row:last-child{border-bottom:none;}
  .cat-name{font-weight:600;font-size:14px;}
  .cat-desc{font-size:12px;color:var(--slate);margin-top:2px;}
  .score-picker{display:flex;gap:4px;}
  .score-btn{
    width:34px;height:34px;
    border-radius:7px;
    border:1px solid var(--line);
    background:var(--chalk);
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    color:var(--ink);
    transition:transform .1s ease;
  }
  .score-btn:hover{transform:translateY(-2px);box-shadow:0 3px 8px rgba(0,0,0,.12);}
  .score-btn.selected{
    background:var(--pitch);
    border-color:var(--pitch-dark);
    color:#fff;
    box-shadow:0 2px 6px rgba(47,110,82,.4);
  }
  /* ---------- STICKY TOTAL ---------- */
  .sticky-total{
    position:sticky;
    bottom:14px;
    margin-top:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--ink);
    color:var(--chalk);
    border-radius:9px;
    padding:14px 18px;
    box-shadow:0 8px 24px rgba(0,0,0,.18);
    flex-wrap:wrap;
    gap:10px;
  }
  .card-chip{
    display:flex;align-items:center;gap:10px;
  }
  .card-swatch{
    width:24px;height:34px;border-radius:3px;
    transform:rotate(-6deg);
    box-shadow:0 3px 6px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.15);
    transition:background .2s ease;
  }
  .total-num{
    font-family:'JetBrains Mono',monospace;
    font-size:22px;font-weight:700;
  }
  .tier-label{font-family:'Oswald';font-size:13px;letter-spacing:.06em;}
  .submit-btn{
    font-family:'JetBrains Mono',monospace;
    text-transform:uppercase;
    letter-spacing:.06em;
    font-size:13px;
    background:var(--whistle);
    color:var(--ink);
    border:none;
    border-radius:7px;
    padding:11px 20px;
    font-weight:700;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .submit-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(242,183,5,.35);}
  .submit-btn:disabled{opacity:.4;cursor:not-allowed;}
  .hint-msg{font-size:12px;color:var(--card-red);margin-top:8px;min-height:16px;}
  .toast{
    position:fixed;top:18px;left:50%;transform:translateX(-50%);
    background:var(--pitch);color:#fff;
    padding:10px 18px;border-radius:7px;
    font-size:13px;font-weight:600;
    box-shadow:0 6px 18px rgba(0,0,0,.2);
    z-index:999;
    max-width:90%;
    text-align:center;
  }
  @media (max-width:640px){
    .meta-grid{grid-template-columns:1fr;}
    .cat-row{grid-template-columns:1fr;}
    .score-picker{justify-content:flex-start;}
  }
</style>

    {id:'w5',  label:'Settimana 5 · 6–10 lug',         start:'2026-07-06'},
    {id:'w6',  label:'Settimana 6 · 13–17 lug',        start:'2026-07-13'},
    {id:'w7',  label:'Settimana 7 · 20–24 lug',        start:'2026-07-20'},
    {id:'w8',  label:'Settimana 8 · 27–31 lug',        start:'2026-07-27'},
    {id:'w9',  label:'Settimana 9 · 3–7 ago',          start:'2026-08-03'},
    {id:'w10', label:'Settimana 10 · 17–21 ago',       start:'2026-08-17'},
    {id:'w11', label:'Settimana 11 · 24–28 ago',       start:'2026-08-24'},
    {id:'w12', label:'Settimana 12 · 31 ago–4 set',    start:'2026-08-31'},
  ];

  const CATEGORIES = [
    {id:'puntualita', label:'Puntualità', group:'campo', desc:'In entrata, in uscita, nelle consegne'},
    {id:'responsabilita', label:'Responsabilità', group:'campo', desc:'Responsabile \u2194 Irresponsabile'},
    {id:'regole', label:'Rispetto delle regole', group:'campo', desc:'Rispetta le regole \u2194 Non le rispetta'},
    {id:'rispetto_gruppo', label:'Rispetto del gruppo', group:'campo', desc:'Mantiene il ruolo \u2194 Non rispetta il gruppo'},
    {id:'device', label:'Gestione device', group:'campo', desc:'Uso corretto \u2194 uso scorretto dei device'},
    {id:'ambienti', label:'Rispetto degli ambienti', group:'campo', desc:'Rispetta \u2194 Non rispetta l\u2019ambiente'},
    {id:'attrezzature', label:'Rispetto delle attrezzature', group:'campo', desc:'Rispetta \u2194 Non rispetta le attrezzature'},

    {id:'gestione_gruppo', label:'Gestione gruppo', group:'squadra', desc:'Sa gestire \u2194 Non sa gestire il gruppo'},
    {id:'condivisione', label:'Condivisione gruppo', group:'squadra', desc:'Condivide coi colleghi \u2194 Non lascia spazio'},
    {id:'squadra', label:'Lavoro di squadra', group:'squadra', desc:'Fa squadra \u2194 Individualista'},
    {id:'ascolto', label:'Capacità di ascolto', group:'squadra', desc:'Sa ascoltare \u2194 Non sa ascoltare'},
    {id:'empatia', label:'Empatia', group:'squadra', desc:'Empatico \u2194 Non crea empatia'},

    {id:'organizzazione', label:'Organizzazione attività', group:'metodo', desc:'Sa organizzarsi \u2194 Disorganizzato'},
    {id:'problem_solving', label:'Problem solving', group:'metodo', desc:'Risolve \u2194 Non risolve i problemi'},
    {id:'mettersi_in_gioco', label:'Mettersi in gioco', group:'metodo', desc:'Sa mettersi in gioco \u2194 Non sa mettersi in gioco'},

    {id:'solarita', label:'Solarità', group:'creativita', desc:'Solare e coinvolgente \u2194 Non coinvolge'},
    {id:'manuale', label:'Capacità manuale', group:'creativita', desc:'Crea giochi/laboratori \u2194 Non sa creare'},
    {id:'inventiva', label:'Inventiva / Creatività', group:'creativita', desc:'Sa inventare e rimodulare \u2194 Non sa inventare'},
    {id:'improvvisazione', label:'Improvvisazione', group:'creativita', desc:'Sa improvvisare \u2194 Non sa improvvisare'},
    {id:'propositivita', label:'Propositività', group:'creativita', desc:'Propositivo \u2194 Non propositivo'},
  ];

  const GROUPS = {
    campo:      {title:'In campo',      sub:'Affidabilità e rispetto delle regole'},
    squadra:    {title:'Di squadra',    sub:'Gestione del gruppo e relazioni'},
    metodo:     {title:'Metodo',        sub:'Organizzazione e problem solving'},
    creativita: {title:'Estro',         sub:'Creatività e coinvolgimento'}
  };

  function tierOf(total){
    if(total>=85) return {label:'OTTIMO', color:'#2F6E52'};
    if(total>=70) return {label:'BUONO', color:'#5B8C3A'};
    if(total>=45) return {label:'SUFFICIENTE', color:'#F2B705'};
    return {label:'INSUFFICIENTE', color:'#D64545'};
  }

  let scores = {};
  let selectedWeeks = new Set();

  const app = document.getElementById('app');

  function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render(){
    app.innerHTML = `
      <div class="site-header">
        <div class="header-top">
          <div class="logo-badge">
            <img src="${LOGO_SRC}" alt="UISP Comitato di Rovigo">
          </div>
          <div class="header-text">
            <div class="eyebrow">Animazione UISP Rovigo</div>
            <h1>Scheda valutazione animatori</h1>
            <div class="sub">Compila la scheda: al termine riceverai il PDF via email, e verrà inviato automaticamente a Umberto.</div>
          </div>
        </div>
      </div>
      <div class="panel" id="panel"></div>
    `;
    renderForm();
  }

  // ---------------- FORM ----------------
  function renderForm(){
    const panel = document.getElementById('panel');
    const groupIds = ['campo','squadra','metodo','creativita'];
    panel.innerHTML = `
      <div class="meta-grid">
        <div class="field">
          <label>Plesso</label>
          <select id="f-plesso">
            <option value="">Seleziona plesso...</option>
            ${PLESSI.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Nome animatore/animatrice</label>
          <input id="f-animatore" type="text" placeholder="Nome e cognome">
        </div>
        <div class="field">
          <label>Coordinatore/coordinatrice</label>
          <input id="f-coordinatore" type="text" placeholder="Il tuo nome">
        </div>
        <div class="field">
          <label>La tua email (per ricevere copia)</label>
          <input id="f-email" type="email" placeholder="nome@esempio.it">
        </div>
        <div class="field full">
          <label>Settimane di riferimento</label>
          <div class="week-picker" id="week-picker">
            ${WEEKS.map(w=>`<button type="button" class="week-chip" data-week="${w.id}">${w.label}</button>`).join('')}
          </div>
        </div>
        <div class="field full">
          <label>Episodi specifici (facoltativo)</label>
          <textarea id="f-episodi" placeholder="Racconta un episodio concreto, positivo o critico, che spiega la tua valutazione..."></textarea>
        </div>
        <div class="field full">
          <label>Feedback migliorativo (facoltativo)</label>
          <textarea id="f-feedback" placeholder="Su cosa dovrebbe lavorare per crescere? Un consiglio pratico per le prossime settimane..."></textarea>
        </div>
      </div>
      ${groupIds.map(gid=>`
        <div class="group-block">
          <div class="group-head">
            <h2>${GROUPS[gid].title}</h2>
            <span class="sub">${GROUPS[gid].sub}</span>
          </div>
          ${CATEGORIES.filter(c=>c.group===gid).map(c=>`
            <div class="cat-row">
              <div>
                <div class="cat-name">${c.label}</div>
                <div class="cat-desc">${c.desc}</div>
              </div>
              <div class="score-picker" data-cat="${c.id}">
                ${[0,1,2,3,4,5].map(n=>`<button type="button" class="score-btn" data-cat="${c.id}" data-val="${n}">${n}</button>`).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `).join('')}
      <div class="hint-msg" id="hint"></div>
      <div class="sticky-total">
        <div class="card-chip">
          <div class="card-swatch" id="card-swatch" style="background:#999"></div>
          <div>
            <div class="total-num" id="total-num">0/100</div>
            <div class="tier-label" id="tier-label">Compila la scheda</div>
          </div>
        </div>
        <button class="submit-btn" id="submit-btn">Invia PDF a Umberto</button>
      </div>
    `;
    scores = {};
    selectedWeeks = new Set();
    panel.querySelectorAll('.week-chip').forEach(chip=>{
      chip.onclick = ()=>{
        const w = chip.dataset.week;
        if(selectedWeeks.has(w)) selectedWeeks.delete(w); else selectedWeeks.add(w);
        chip.classList.toggle('selected', selectedWeeks.has(w));
      };
    });
    panel.querySelectorAll('.score-btn').forEach(btn=>{
      btn.onclick = ()=>{
        const cat = btn.dataset.cat, val = parseInt(btn.dataset.val,10);
        scores[cat] = val;
        panel.querySelectorAll(`.score-btn[data-cat="${cat}"]`).forEach(b=>{
          b.classList.toggle('selected', parseInt(b.dataset.val,10)===val);
        });
        updateTotal();
      };
    });
    document.getElementById('submit-btn').onclick = submitEvaluation;
    updateTotal();
  }

  function updateTotal(){
    const total = Object.values(scores).reduce((a,b)=>a+b,0);
    const filled = Object.keys(scores).length;
    const t = tierOf(total);
    document.getElementById('total-num').textContent = total + '/100';
    document.getElementById('tier-label').textContent = filled < CATEGORIES.length
      ? `${filled}/${CATEGORIES.length} voci compilate`
      : t.label;
    document.getElementById('card-swatch').style.background = filled < CATEGORIES.length ? '#8A8F86' : t.color;
  }

  async function submitEvaluation(){
    const plesso = document.getElementById('f-plesso').value;
    const plessoAltro = plesso === 'Altro' ? prompt('Nome del plesso:') : null;
    const animatore = document.getElementById('f-animatore').value.trim();
    const coordinatore = document.getElementById('f-coordinatore').value.trim();
    const coordinatoreEmail = document.getElementById('f-email').value.trim();
    const episodi = document.getElementById('f-episodi').value.trim();
    const feedback = document.getElementById('f-feedback').value.trim();
    const hint = document.getElementById('hint');

    if(!plesso || (plesso==='Altro' && !plessoAltro) || !animatore || !coordinatore){
      hint.textContent = 'Compila plesso, nome animatore e coordinatore.';
      return;
    }
    if(selectedWeeks.size === 0){
      hint.textContent = 'Seleziona almeno una settimana.';
      return;
    }
    if(Object.keys(scores).length < CATEGORIES.length){
      hint.textContent = `Mancano ancora ${CATEGORIES.length - Object.keys(scores).length} voci da valutare.`;
      return;
    }
    hint.textContent = '';
    const total = Object.values(scores).reduce((a,b)=>a+b,0);
    const tier = tierOf(total);
    const weekObjs = WEEKS.filter(w=>selectedWeeks.has(w.id)).sort((a,b)=>a.start.localeCompare(b.start));
    const evaluation = {
      plesso: plesso==='Altro' ? plessoAltro : plesso,
      animatore, anno: 2026, coordinatore, coordinatoreEmail, episodi, feedback,
      settimane: weekObjs.map(w=>w.id),
      settimaneLabel: weekObjs.map(w=>w.label).join(', '),
      settimanaInizio: weekObjs[0].start,
      scores: {...scores}, totale: total, tier: tier.label,
      timestamp: Date.now()
    };

    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true; submitBtn.textContent = 'Preparo il PDF...';
    try{
      const doc = buildEvaluationPdf(evaluation);
      const filename = `Valutazione_${evaluation.animatore.replace(/\s+/g,'_')}_${evaluation.settimanaInizio}.pdf`;
      await sendPdfToUmberto(doc, filename, evaluation);
    }catch(e){
      console.error(e);
      hint.textContent = 'Errore nella generazione del PDF. Riprova.';
      submitBtn.disabled = false; submitBtn.textContent = 'Invia PDF a Umberto';
      return;
    }
    submitBtn.disabled = false;
    renderForm();
  }

  function showToast(msg){
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 3600);
  }

  // ---------------- PDF ----------------
  function buildEvaluationPdf(ev){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'pt', format:'a4'});
    const marginX = 44;
    let y = 50;

    doc.setFillColor(22,36,43);
    doc.rect(0,0,595,64,'F');
    try{ doc.addImage(LOGO_SRC, 'PNG', marginX, 10, 44, 44); }catch(e){}
    doc.setTextColor(242,183,5);
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.text('ANIMAZIONE UISP ROVIGO', marginX+54, 26);
    doc.setTextColor(255,255,255);
    doc.setFontSize(16);
    doc.text('Scheda di valutazione animatore', marginX+54, 46);
    y = 96;

    doc.setTextColor(22,36,43);
    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.text(ev.animatore, marginX, y);
    y += 18;
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(90,100,98);
    doc.text(`Plesso: ${ev.plesso}    ${ev.anno}    Coordinatore: ${ev.coordinatore}`, marginX, y);
    y += 14;
    doc.setFontSize(9.5);
    doc.text(`Settimane: ${ev.settimaneLabel}`, marginX, y);
    y += 24;

    const groupIds = ['campo','squadra','metodo','creativita'];
    doc.setFontSize(9);
    groupIds.forEach(gid=>{
      if(y > 760){ doc.addPage(); y = 50; }
      doc.setFont('helvetica','bold');
      doc.setTextColor(47,110,82);
      doc.setFontSize(10);
      doc.text(GROUPS[gid].title.toUpperCase(), marginX, y);
      y += 6;
      doc.setDrawColor(228,225,214);
      doc.line(marginX, y, 551, y);
      y += 14;
      doc.setFont('helvetica','normal');
      doc.setFontSize(9.5);
      doc.setTextColor(22,36,43);
      CATEGORIES.filter(c=>c.group===gid).forEach(c=>{
        if(y > 780){ doc.addPage(); y = 50; }
        doc.text(c.label, marginX, y);
        doc.setFont('helvetica','bold');
        doc.text(`${ev.scores[c.id]} / 5`, 500, y);
        doc.setFont('helvetica','normal');
        y += 16;
      });
      y += 8;
    });

    if(y > 700){ doc.addPage(); y = 50; }
    const t = tierOf(ev.totale);
    const [r,g,b] = hexToRgb(t.color);
    doc.setFillColor(r,g,b);
    doc.roundedRect(marginX, y, 200, 40, 6, 6, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(16);
    doc.text(`${ev.totale} / 100`, marginX+14, y+25);
    doc.setFontSize(10);
    doc.text(t.label, marginX+110, y+25);
    y += 60;

    doc.setTextColor(22,36,43);
    if(ev.episodi){
      doc.setFont('helvetica','bold'); doc.setFontSize(10);
      doc.text('Episodi specifici', marginX, y); y += 14;
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
      y = wrapText(doc, ev.episodi, marginX, y, 500);
      y += 12;
    }
    if(ev.feedback){
      if(y > 760){ doc.addPage(); y = 50; }
      doc.setFont('helvetica','bold'); doc.setFontSize(10);
      doc.text('Feedback migliorativo', marginX, y); y += 14;
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
      y = wrapText(doc, ev.feedback, marginX, y, 500);
    }
    return doc;
  }

  function wrapText(doc, text, x, y, maxWidth){
    const lines = doc.splitTextToSize(text, maxWidth);
    lines.forEach(line=>{
      if(y > 790){ doc.addPage(); y = 50; }
      doc.text(line, x, y);
      y += 13;
    });
    return y;
  }

  function hexToRgb(hex){
    const m = hex.replace('#','');
    return [parseInt(m.substring(0,2),16), parseInt(m.substring(2,4),16), parseInt(m.substring(4,6),16)];
  }

  async function sendPdfToUmberto(doc, filename, ev){
    const pdfBase64 = doc.output('datauristring').split(',')[1];
    try{
      const res = await fetch(SEND_ENDPOINT, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          to: EMAIL_TO, cc: ev.coordinatoreEmail || undefined, filename, pdfBase64,
          animatore: ev.animatore, plesso: ev.plesso, settimane: ev.settimaneLabel,
          coordinatore: ev.coordinatore, totale: ev.totale, tier: ev.tier
        })
      });
      if(!res.ok) throw new Error('function not available');
      showToast(`PDF inviato a Umberto ✓ ${ev.coordinatoreEmail ? '(copia inviata anche a te)' : ''}`);
    }catch(e){
      // fallback: nessuna funzione Netlify configurata ancora -> scarica il PDF
      // e apre il client email con destinatario e oggetto pronti
      doc.save(filename);
      const subject = encodeURIComponent(`Valutazione ${ev.animatore} - ${ev.plesso} - ${ev.settimaneLabel}`);
      const body = encodeURIComponent(`Ciao,\n\nin allegato la valutazione di ${ev.animatore} (${ev.plesso}, ${ev.settimaneLabel}).\nPunteggio: ${ev.totale}/100 - ${ev.tier}\n\nIl PDF è stato scaricato automaticamente: allegalo a questa email prima di inviarla.\n\nCoordinatore: ${ev.coordinatore}`);
      window.location.href = `mailto:${EMAIL_TO}?subject=${subject}&body=${body}`;
      showToast('PDF scaricato: allegalo alla mail che si è aperta e invia a Umberto.');
    }
  }

  render();
})();
</script>
